<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transactions</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li class="active"><a href="transactions.html">Transactions</a></li>
      <li><a href="overall.html">Analytics</a></li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <h2>Transactions</h2>
      <p id="welcomeUser"></p>
    </div>

    <!-- STATS -->
    <div class="summary">
      <div class="card">
        <h3>Total Transactions</h3>
        <p id="totalCount">0</p>
      </div>

      <div class="card income">
        <h3>Total Income</h3>
        <p id="totalIncome">$0</p>
      </div>

      <div class="card expense">
        <h3>Total Expenses</h3>
        <p id="totalExpense">$0</p>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="card">
      <h3>Filters</h3>

      <div class="filters">
        <input type="text" id="search" placeholder="Search category...">

        <select id="filterType">
          <option value="">All Types</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>

        <input type="date" id="startDate">
        <input type="date" id="endDate">
      </div>
    </div>

    <!-- TABLE -->
    <div class="card">
      <h3>All Transactions</h3>

      <table id="transactionsTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Description</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

    </div>

  </div>

</div>

<script src="js/transactions.js"></script>
</body>
</html>
